<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linked List Merge Visualizer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="buttons">
      <button class="run-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3" />
        </svg>
        Run
      </button>
      <button class="step-btn" id="stepBackBtn" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="19 20 9 12 19 4 19 20" />
          <line x1="5" y1="19" x2="5" y2="5" />
        </svg>
        Step Back
      </button>
      <button class="step-btn" id="stepForwardBtn" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 4 15 12 5 20 5 4" />
          <line x1="19" y1="5" x2="19" y2="19" />
        </svg>
        Step Forward
      </button>
      <button class="reset-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        Reset
      </button>
    </div>

    <div class="grid">
      <div class="panel code-editor">
        <div class="panel-header">Code Editor</div>
        <div class="panel-content">
          <div class="code-container" id="codeContainer">
            <pre id="codeDisplay"></pre>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Dry-Run Output</div>
        <div class="panel-content dry-run-output" id="dryRunOutput"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
